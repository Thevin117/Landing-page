<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Lead Qualifier ROI Calculator | Synaprix</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --navy: #0A1628;
    --teal: #0D9488;
    --teal-light: #14B8A6;
    --teal-dark: #134E4A;
    --red: #DC2626;
    --red-light: #FEE2E2;
    --green: #10B981;
    --green-light: #D1FAE5;
    --gray-50: #F9FAFB;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-400: #9CA3AF;
    --gray-600: #4B5563;
    --gray-700: #374151;
    --gray-900: #111827;
  }
  
  body {
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    background: linear-gradient(135deg, #0A1628 0%, #134E4A 100%);
    min-height: 100vh;
    color: var(--gray-900);
    padding: 20px;
  }
  
  .container {
    max-width: 900px;
    margin: 0 auto;
  }
  
  .header {
    text-align: center;
    color: white;
    margin-bottom: 40px;
    animation: fadeInDown 0.6s ease-out;
  }
  
  .header h1 {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 700;
    margin-bottom: 12px;
    letter-spacing: -0.02em;
  }
  
  .header p {
    font-size: clamp(16px, 3vw, 20px);
    opacity: 0.9;
    font-weight: 400;
  }
  
  .calculator-card {
    background: white;
    border-radius: 16px;
    padding: clamp(24px, 5vw, 48px);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    animation: fadeInUp 0.6s ease-out 0.2s both;
  }
  
  .section {
    margin-bottom: 40px;
  }
  
  .section-title {
    font-size: 24px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  
  .section-number {
    background: var(--teal);
    color: white;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
  }
  
  .input-group {
    margin-bottom: 24px;
  }
  
  .input-label {
    display: block;
    font-size: 16px;
    font-weight: 500;
    color: var(--gray-700);
    margin-bottom: 8px;
  }
  
  .input-hint {
    font-size: 13px;
    color: var(--gray-400);
    margin-left: 4px;
  }
  
  input[type="number"], input[type="email"], input[type="text"] {
    width: 100%;
    padding: 14px 16px;
    font-size: 18px;
    font-family: 'JetBrains Mono', monospace;
    border: 2px solid var(--gray-200);
    border-radius: 8px;
    transition: all 0.2s;
    background: var(--gray-50);
  }
  
  input:focus {
    outline: none;
    border-color: var(--teal);
    background: white;
    box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.1);
  }
  
  .results-box {
    background: linear-gradient(135deg, var(--red-light) 0%, #FEF2F2 100%);
    border: 2px solid var(--red);
    border-radius: 12px;
    padding: 32px;
    margin-bottom: 32px;
    animation: slideIn 0.4s ease-out;
  }
  
  .results-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--red);
    margin-bottom: 20px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  
  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 0;
    border-bottom: 1px solid rgba(220, 38, 38, 0.2);
  }
  
  .stat-row:last-child {
    border-bottom: none;
  }
  
  .stat-label {
    font-size: 16px;
    color: var(--gray-700);
    font-weight: 500;
  }
  
  .stat-value {
    font-size: 24px;
    font-weight: 700;
    color: var(--red);
    font-family: 'JetBrains Mono', monospace;
  }
  
  .annual-waste {
    background: var(--red);
    color: white;
    padding: 24px;
    border-radius: 8px;
    margin-top: 20px;
    text-align: center;
  }
  
  .annual-waste-label {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    opacity: 0.9;
    margin-bottom: 8px;
  }
  
  .annual-waste-value {
    font-size: 42px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }
  
  .with-ai-box {
    background: linear-gradient(135deg, var(--green-light) 0%, #F0FDF4 100%);
    border: 2px solid var(--green);
    border-radius: 12px;
    padding: 32px;
    margin-bottom: 32px;
    animation: slideIn 0.4s ease-out 0.1s both;
  }
  
  .with-ai-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--green);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  
  .impact-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-top: 20px;
  }
  
  .impact-card {
    background: white;
    padding: 20px;
    border-radius: 8px;
    text-align: center;
  }
  
  .impact-value {
    font-size: 32px;
    font-weight: 700;
    color: var(--green);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 8px;
  }
  
  .impact-label {
    font-size: 14px;
    color: var(--gray-600);
    font-weight: 500;
  }
  
  .email-gate {
    background: var(--navy);
    color: white;
    padding: 40px;
    border-radius: 12px;
    text-align: center;
    animation: slideIn 0.4s ease-out 0.2s both;
  }
  
  .email-gate h3 {
    font-size: 28px;
    margin-bottom: 12px;
    font-weight: 700;
  }
  
  .email-gate p {
    font-size: 16px;
    opacity: 0.9;
    margin-bottom: 24px;
  }
  
  .email-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 400px;
    margin: 0 auto;
  }
  
  .email-form input {
    background: rgba(255, 255, 255, 0.1);
    border: 2px solid rgba(255, 255, 255, 0.2);
    color: white;
  }
  
  .email-form input::placeholder {
    color: rgba(255, 255, 255, 0.5);
  }
  
  .email-form input:focus {
    background: rgba(255, 255, 255, 0.15);
    border-color: var(--teal);
  }
  
  .submit-btn {
    background: var(--teal);
    color: white;
    border: none;
    padding: 16px 32px;
    font-size: 18px;
    font-weight: 700;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Space Grotesk', sans-serif;
  }
  
  .submit-btn:hover {
    background: var(--teal-light);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(13, 148, 136, 0.3);
  }
  
  .submit-btn:disabled {
    background: var(--gray-400);
    cursor: not-allowed;
    transform: none;
  }
  
  .success-message {
    background: var(--green);
    color: white;
    padding: 32px;
    border-radius: 12px;
    text-align: center;
    animation: slideIn 0.4s ease-out;
  }
  
  .success-message h3 {
    font-size: 32px;
    margin-bottom: 16px;
  }
  
  .success-message p {
    font-size: 18px;
    line-height: 1.6;
  }
  
  .cta-box {
    background: var(--teal);
    color: white;
    padding: 32px;
    border-radius: 12px;
    text-align: center;
    margin-top: 32px;
  }
  
  .cta-box h3 {
    font-size: 24px;
    margin-bottom: 12px;
  }
  
  .cta-box p {
    font-size: 16px;
    opacity: 0.95;
  }
  
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  
  @media (max-width: 600px) {
    .calculator-card {
      padding: 24px;
    }
    
    .stat-row {
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }
    
    .annual-waste-value {
      font-size: 32px;
    }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

function ROICalculator() {
  const [leads, setLeads] = useState('');
  const [closeRate, setCloseRate] = useState('');
  const [callTime, setCallTime] = useState('');
  const [hourlyRate, setHourlyRate] = useState('');
  const [email, setEmail] = useState('');
  const [name, setName] = useState('');
  const [submitted, setSubmitted] = useState(false);
  
  const totalLeads = parseFloat(leads) || 0;
  const closePercentage = parseFloat(closeRate) || 0;
  const avgCallMinutes = parseFloat(callTime) || 0;
  const repCost = parseFloat(hourlyRate) || 0;
  
  // Calculations
  const closedLeads = totalLeads * (closePercentage / 100);
  const unqualifiedLeads = totalLeads - closedLeads;
  const wastedMinutes = unqualifiedLeads * avgCallMinutes;
  const wastedHours = wastedMinutes / 60;
  const monthlyCost = wastedHours * repCost;
  const annualWaste = monthlyCost * 12;
  
  // With AI projections
  const aiFilterRate = 0.50; // AI filters out 50% of bad leads
  const newCallVolume = totalLeads - (unqualifiedLeads * aiFilterRate);
  const timeReduction = wastedHours * aiFilterRate;
  const costSavings = monthlyCost * aiFilterRate;
  const improvedCloseRate = closePercentage * 1.4; // 40% improvement
  
  const hasCalculated = totalLeads > 0 && closePercentage > 0 && avgCallMinutes > 0 && repCost > 0;
  
  const handleSubmit = (e) => {
    e.preventDefault();
    
    // In production, send to your email capture API
    console.log('Email captured:', { email, name, calculations: {
      annualWaste,
      costSavings,
      timeReduction
    }});
    
    // Simulate API call
    setTimeout(() => {
      setSubmitted(true);
      
      // Download a simple report (in production, generate PDF)
      const reportData = `
SYNAPRIX AI - YOUR ROI CALCULATION REPORT
==========================================

${name ? `Name: ${name}` : ''}
Email: ${email}

YOUR CURRENT SITUATION:
- Monthly leads: ${totalLeads}
- Close rate: ${closePercentage}%
- Time per call: ${avgCallMinutes} minutes
- Rep hourly cost: RM ${repCost}

CURRENT WASTE:
- Unqualified leads: ${unqualifiedLeads.toFixed(0)}/month
- Wasted time: ${wastedHours.toFixed(1)} hours/month
- Monthly cost: RM ${monthlyCost.toFixed(0)}
- ANNUAL WASTE: RM ${annualWaste.toFixed(0)}

WITH AI LEAD QUALIFIER:
- Calls reduced to: ${newCallVolume.toFixed(0)}/month (50% fewer bad leads)
- Time saved: ${timeReduction.toFixed(1)} hours/month
- Monthly savings: RM ${costSavings.toFixed(0)}
- New close rate: ${improvedCloseRate.toFixed(1)}%

NEXT STEP:
DM us "QUALIFY" on Instagram @synaprix
We'll send you the exact AI qualifier setup we use with clients.

Synaprix AI - Real AI Results, No Vendor Bias
      `;
      
      const blob = new Blob([reportData], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'synaprix-roi-report.txt';
      a.click();
    }, 800);
  };
  
  return (
    <div className="container">
      <div className="header">
        <h1>💰 AI Lead Qualifier ROI Calculator</h1>
        <p>Calculate exactly how much unqualified leads are costing you right now</p>
      </div>
      
      <div className="calculator-card">
        <div className="section">
          <div className="section-title">
            <span className="section-number">1</span>
            Your Current Numbers
          </div>
          
          <div className="input-group">
            <label className="input-label">
              Total leads per month
              <span className="input-hint">(all enquiries, calls, form fills)</span>
            </label>
            <input 
              type="number" 
              value={leads}
              onChange={(e) => setLeads(e.target.value)}
              placeholder="e.g., 100"
            />
          </div>
          
          <div className="input-group">
            <label className="input-label">
              % that actually close
              <span className="input-hint">(typical: 10-20%)</span>
            </label>
            <input 
              type="number" 
              value={closeRate}
              onChange={(e) => setCloseRate(e.target.value)}
              placeholder="e.g., 15"
            />
          </div>
          
          <div className="input-group">
            <label className="input-label">
              Average time per call (minutes)
              <span className="input-hint">(initial qualifying call)</span>
            </label>
            <input 
              type="number" 
              value={callTime}
              onChange={(e) => setCallTime(e.target.value)}
              placeholder="e.g., 25"
            />
          </div>
          
          <div className="input-group">
            <label className="input-label">
              Sales rep hourly cost (RM)
              <span className="input-hint">(salary + overhead / hours worked)</span>
            </label>
            <input 
              type="number" 
              value={hourlyRate}
              onChange={(e) => setHourlyRate(e.target.value)}
              placeholder="e.g., 50"
            />
          </div>
        </div>
        
        {hasCalculated && (
          <>
            <div className="section">
              <div className="section-title">
                <span className="section-number">2</span>
                Your Monthly Waste
              </div>
              
              <div className="results-box">
                <div className="results-title">⚠️ Current Situation</div>
                
                <div className="stat-row">
                  <span className="stat-label">Unqualified leads</span>
                  <span className="stat-value">{unqualifiedLeads.toFixed(0)}/month</span>
                </div>
                
                <div className="stat-row">
                  <span className="stat-label">Hours wasted on bad leads</span>
                  <span className="stat-value">{wastedHours.toFixed(1)} hrs</span>
                </div>
                
                <div className="stat-row">
                  <span className="stat-label">Monthly cost of wasted time</span>
                  <span className="stat-value">RM {monthlyCost.toFixed(0)}</span>
                </div>
                
                <div className="annual-waste">
                  <div className="annual-waste-label">Annual Waste</div>
                  <div className="annual-waste-value">RM {annualWaste.toFixed(0)}</div>
                </div>
              </div>
            </div>
            
            <div className="section">
              <div className="section-title">
                <span className="section-number">3</span>
                With AI Lead Qualifier
              </div>
              
              <div className="with-ai-box">
                <div className="with-ai-title">✓ After AI Implementation</div>
                <p style={{color: 'var(--gray-700)', marginBottom: '20px'}}>
                  An AI qualifier screens leads <strong>before</strong> your team picks up the phone.
                </p>
                
                <div className="impact-grid">
                  <div className="impact-card">
                    <div className="impact-value">{newCallVolume.toFixed(0)}</div>
                    <div className="impact-label">Monthly calls<br/>(50% reduction)</div>
                  </div>
                  
                  <div className="impact-card">
                    <div className="impact-value">{timeReduction.toFixed(1)}h</div>
                    <div className="impact-label">Time saved<br/>per month</div>
                  </div>
                  
                  <div className="impact-card">
                    <div className="impact-value">RM {costSavings.toFixed(0)}</div>
                    <div className="impact-label">Monthly<br/>savings</div>
                  </div>
                  
                  <div className="impact-card">
                    <div className="impact-value">{improvedCloseRate.toFixed(1)}%</div>
                    <div className="impact-label">New close rate<br/>(40% boost)</div>
                  </div>
                </div>
              </div>
            </div>
            
            {!submitted ? (
              <div className="email-gate">
                <h3>📧 Get Your Full ROI Report</h3>
                <p>Enter your email to download your personalized breakdown + implementation guide</p>
                
                <form className="email-form" onSubmit={handleSubmit}>
                  <input 
                    type="text"
                    placeholder="Your name (optional)"
                    value={name}
                    onChange={(e) => setName(e.target.value)}
                  />
                  <input 
                    type="email"
                    placeholder="Your email"
                    value={email}
                    onChange={(e) => setEmail(e.target.value)}
                    required
                  />
                  <button type="submit" className="submit-btn">
                    Download My Report
                  </button>
                </form>
              </div>
            ) : (
              <div className="success-message">
                <h3>✅ Report Downloaded!</h3>
                <p>Check your downloads folder for your personalized ROI report.</p>
                <p style={{marginTop: '16px'}}>We've also emailed you the full implementation guide.</p>
              </div>
            )}
            
            <div className="cta-box">
              <h3>Ready to Stop Wasting Time on Bad Leads?</h3>
              <p><strong>DM us "QUALIFY" on Instagram @synaprix</strong><br/>
              We'll send you the exact AI qualifier flow we use with clients.</p>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<ROICalculator />, document.getElementById('root'));
</script>
</body>
</html>
